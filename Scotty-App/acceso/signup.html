<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Scotty.app</title>
    <link rel="stylesheet" href="../otros/estilos.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">Scotty.app</a>

            <div class="menu">
                <a href="signin.html">Sign in</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="formulario">
            <h1>Crear cuenta</h1>
            <p>Registrate para empezar tus quiz, ganar XP y desbloquear recompensas.</p>

            <form id="formSignup">
                <label for="nombre">Nombre/s</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required>

                <label for="usuario">Nombre de usuario</label>
                <input type="text" id="usuario" name="usuario" required>

                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" name="correo" required>

                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required>

                <button type="submit">Crear cuenta</button>
            </form>

            <p>
                &iquest;Ya tienes cuenta?
                <a href="signin.html">Inicia sesion</a>
            </p>
        </section>
    </main>
    <script src="../otros/script.js"></script>
</body>
</html>
