<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - Scotty.app</title>
    <link rel="stylesheet" href="../otros/estilos.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">Scotty.app</a>

            <div class="menu">
                <a href="signup.html">Sign up</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="formulario">
            <h1>Iniciar sesion</h1>
            <p>Entra con tu cuenta para seguir ganando experiencia y puntos.</p>

            <form id="formSignin">
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" name="correo" required>

                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required>

                <button type="submit">Entrar</button>
            </form>

            <p>
                &iquest;No tienes cuenta?
                <a href="signup.html">Registrate</a>
            </p>
        </section>
    </main>
    <script src="../otros/script.js"></script>
</body>
</html>
